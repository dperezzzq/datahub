<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DataHub Palo Blanco - Iniciar sesión</title>
    <link rel="icon" href="{{ url_for('static', filename='img/DataHub.ico') }}" type="image/png">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

    <style>
        body {
            background: linear-gradient(135deg, #1d2b2b, #517451);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .login-container {
            background-color: #2c3e50;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
            color: #f1c40f;
        }

        .form-control {
            background-color: #ecf0f1;
            border-radius: 8px;
        }

        .btn-login {
            background-color: #27ae60;
            color: white;
            border: none;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-login:hover {
            background-color: #219150;
        }

        .btn-microsoft {
            background-color: #2f2f2f;
            border: none;
            color: #fff;
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
        }

        .btn-microsoft:hover {
            background-color: #3a3a3a;
        }

        .btn-microsoft i {
            font-size: 1.3rem;
            margin-right: 12px;

        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ccc;
        }
    </style>
</head>

<body>

<!-- Contenedor de Toasts -->
    <div aria-live="polite" aria-atomic="true" class="position-fixed top-0 end-0 p-3"
        style="z-index: 1080; min-width: 300px;">
        <div id="toastContainer">
            <!-- Aquí se inyectan los toasts desde JS -->
        </div>
    </div>

    <div class="login-container">
        <img src="{{ url_for('static', filename='img/logoPB.png') }}" alt="Logo" class="me-2"
            style="height: 100px; position: relative; top: -20px; left: 50%; transform: translateX(-50%);">
        <h2 class="login-title"><i class="bi bi-bar-chart-fill me-2"></i>DataHub </br> Palo Blanco Fresh</h2>
        <p class="text-center text-light mb-4" style="font-size: 0.95rem;">
            Accede a reportes estratégicos y visualizaciones interactivas de datos
        </p>

        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
            </button>
        </form>

        <div class="text-center my-2">
            <span>o</span>
        </div>

        <a href="{{ url_for('login_microsoft') }}" class="btn btn-microsoft">
            <i class="bi bi-microsoft"></i> Iniciar sesión con Microsoft
        </a>

        <div class="footer mt-4">
            © {{ year if year else "2025" }} Palo Blanco
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toastContainer = document.getElementById('toastContainer');

            function showFlashMessages() {
        const messages = [
            {% with messages = get_flashed_messages(with_categories = true) %}
            {% for category, message in messages %}
            { category: "{{ category }}", message: {{ message | tojson }} }{% if not loop.last %}, {% endif %}
            {% endfor %}
            {% endwith %}
        ];

        function mapCategoryToBootstrapClass(category) {
            switch (category) {
                case 'success': return 'success';
                case 'danger': return 'danger';
                case 'warning': return 'warning';
                case 'info': return 'info';
                default: return 'secondary';
            }
        }

        messages.forEach(({ category, message }) => {
            const toastEl = document.createElement('div');
            toastEl.className = 'toast align-items-center text-bg-' + mapCategoryToBootstrapClass(category) + ' border-0';
            toastEl.setAttribute('role', 'alert');
            toastEl.setAttribute('aria-live', 'assertive');
            toastEl.setAttribute('aria-atomic', 'true');

            toastEl.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Cerrar"></button>
                </div>
            `;
            toastContainer.appendChild(toastEl);
            new bootstrap.Toast(toastEl, { delay: 5000 }).show();
        });
    }
            showFlashMessages();
        });
    </script>


</body>

</html>
