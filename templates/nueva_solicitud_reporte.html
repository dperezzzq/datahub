{% extends "base.html" %}

{% block title %}Nueva Solicitud de Reporte{% endblock %}

{% block content %}
<div class="container-fluid">
    <div id="vista-areas">
    
    <div
            class="header-banner d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 position-relative">
            <h3 class="mb-3 mb-md-0 text-secondary">
                <i class="bi-file-earmark-plus me-2 text-dark"></i><span>/ Nueva Solicitud de Reporte</span>
            </h3>
        </div>
    <form method="POST">
        <div class="row">
            <div class="mb-3 col-md-6">
                <label for="reporte" class="form-label">Nombre del Reporte</label>
                <input type="text" class="form-control" name="reporte" id="reporte" required>
            </div>
            <div class="mb-3 col-md-6">
                <label for="area" class="form-label">Área</label>
                <input type="text" class="form-control" name="area" id="area" required>
            </div>
        </div>

        <div class="row">
            <div class="mb-3 col-md-6">
                <label for="fecha_solicitud" class="form-label">Fecha de Solicitud</label>
                <input type="text" class="form-control flatpickr-fecha" name="fecha_solicitud" id="fecha_solicitud" required>
            </div>
            <div class="mb-3 col-md-6">
                <label for="solicitado_por" class="form-label">Solicitado por</label>
                <input type="text" class="form-control" name="solicitado_por" id="solicitado_por" required>
            </div>
        </div>

        <div class="row">
            <div class="mb-3 col-md-6">
                <label for="prioridad" class="form-label">Prioridad</label>
                <select name="prioridad" class="form-select" id="prioridad" required>
                    <option value="Alta">Alta</option>
                    <option value="Media" selected>Media</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>
            <div class="mb-3 col-md-6">
                <label for="fecha_entregado" class="form-label">Fecha de Entrega</label>
                <input type="text" class="form-control flatpickr-fecha" name="fecha_entregado" id="fecha_entregado">
            </div>
        </div>

        <div class="mb-3">
            <label for="encargado" class="form-label">Encargado</label>
            <input type="text" class="form-control" name="encargado" id="encargado">
        </div>

        <button type="submit" class="btn btn-success"><i class="bi bi-save me-1"></i>Guardar Solicitud</button>
    </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    flatpickr(".flatpickr-fecha", {
        dateFormat: "Y-m-d",
        locale: "es"
    });
</script>
{% endblock %}
